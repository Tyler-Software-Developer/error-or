# Depot CI workflow.
# NOTE: NuGet Trusted Publishing (OIDC) is not usable from Depot CI — nuget.org
# only trusts GitHub Actions' OIDC issuer, not Depot's (identity.depot.dev).
# Publishing therefore uses a long-lived NuGet API key stored as a Depot CI
# secret (NUGET_API_KEY) instead of OIDC.

name: Publish TylerSoftware.ErrorOr to NuGet
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
jobs:
  publish:
    name: Build, Pack & Publish
    runs-on: depot-ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Source Link
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release --no-restore
      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal
      - name: Package
        run: dotnet pack -c Release --no-build src/TylerSoftware.ErrorOr.csproj
      - name: List packages
        run: |
          echo "Packages to publish:"
          ls -la ./artifacts/
      - name: Publish NuGet Package and Symbols
        run: |
          dotnet nuget push ./artifacts/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push ./artifacts/*.snupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
