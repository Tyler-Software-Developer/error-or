# Depot CI Migration
# Source: .github\workflows\build.yml
#
# No changes were necessary.

name: Build
on:
  workflow_dispatch:
  push:
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: depot-ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['8.0.x', '10.0.x']
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Source Link
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release --no-restore
      - name: Test
        run: dotnet test -c Release --no-restore --verbosity normal --collect:"XPlat Code Coverage"
      - name: Upload coverage to Codecov
        if: matrix.dotnet-version == '10.0.x'
        # Coverage upload is best-effort on Depot CI: a codecov-side issue
        # (e.g. CLI signature verification) must never fail the build.
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true
