name: Publish TylerSoftware.ErrorOr to NuGet

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build, Pack & Publish
    runs-on: depot-ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC token issuance (Trusted Publishing)
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for Source Link

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Package
        run: dotnet pack -c Release --no-build src/TylerSoftware.ErrorOr.csproj

      # List packages to publish
      - name: List packages
        run: |
          echo "Packages to publish:"
          ls -la ./artifacts/

      # Exchange the GitHub OIDC token for a short-lived NuGet API key (Trusted Publishing).
      # Requires a Trusted Publishing policy configured on nuget.org for this repo/workflow,
      # and a repository variable NUGET_USER set to the nuget.org account username that owns the policy.
      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}

      # Publish the package and its symbols using the short-lived API key
      - name: Publish NuGet Package and Symbols
        run: |
          dotnet nuget push ./artifacts/*.nupkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push ./artifacts/*.snupkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
